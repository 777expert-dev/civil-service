<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정처 종합민원시스템</title>
<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#F0F4F8;min-height:100vh;color:#1E293B}
.hdr{background:linear-gradient(135deg,#1F3864 0%,#2E74B5 100%);color:#fff;padding:0}
.hdr-inner{max-width:1200px;margin:0 auto;padding:24px 20px 20px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:14px}
.hdr-emblem{width:52px;height:52px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.hdr-sub{font-size:12px;opacity:.75;margin-top:3px;font-weight:400}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-admin-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.hdr-admin-btn:hover{background:rgba(255,255,255,.25)}
.fb-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700}
.fb-badge.offline{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65)}
.fb-badge.connecting{background:rgba(251,191,36,.2);color:#FCD34D}
.fb-badge.connected{background:rgba(34,197,94,.2);color:#86EFAC}
.fb-badge.error{background:rgba(239,68,68,.2);color:#FCA5A5}
.hdr-notice{background:rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;margin-top:14px;font-size:12px;display:flex;align-items:center;gap:8px}
.hdr-notice .dot{width:6px;height:6px;border-radius:50%;background:#FCD34D;flex-shrink:0;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.toolbar{max-width:1200px;margin:0 auto;padding:18px 20px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid #CBD5E1;border-radius:10px;font-size:13.5px;font-family:inherit;background:#fff;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:#2E74B5}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:15px;pointer-events:none}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:8px 14px;border:1.5px solid #CBD5E1;border-radius:8px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#475569;transition:all .15s;white-space:nowrap}
.filter-btn.active,.filter-btn:hover{background:#1F3864;color:#fff;border-color:#1F3864}
.grid-wrap{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:22px 20px 18px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;border:2px solid transparent;text-decoration:none;color:inherit;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:#2E74B5}
.card-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;margin-bottom:12px;width:fit-content}
.card-icon{font-size:36px;margin-bottom:10px;line-height:1}
.card-title{font-size:15.5px;font-weight:800;color:#1E293B;margin-bottom:6px;line-height:1.3}
.card-desc{font-size:12.5px;color:#64748B;line-height:1.6;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid #F1F5F9}
.card-link-label{font-size:12px;font-weight:700;color:#2E74B5}
.card-new{position:absolute;top:14px;right:14px;background:#EF4444;color:#fff;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:10px}
.empty{text-align:center;padding:60px 20px;color:#94A3B8;grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hd{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:800;color:#1E293B}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94A3B8;padding:4px;line-height:1}
.modal-body{padding:16px 20px 20px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:5px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:9px 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:#2E74B5}
.form-row textarea{resize:vertical;min-height:70px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 20px}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-p{background:#1F3864;color:#fff}.btn-p:hover{background:#2E74B5}
.btn-g{background:#F1F5F9;color:#475569}.btn-g:hover{background:#E2E8F0}
.btn-r{background:#FEE2E2;color:#DC2626}.btn-r:hover{background:#FECACA}
.btn-fb{background:#FFA000;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-fb:hover{background:#FF8F00}
.btn-sm{padding:5px 12px;font-size:12px}
.pw-hint{font-size:11px;color:#94A3B8;margin-top:4px}
.admin-panel{max-width:1200px;margin:0 auto;padding:0 20px 40px}
.admin-panel.hidden{display:none}
.admin-bar{background:#1F3864;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.admin-bar-title{color:#fff;font-size:14px;font-weight:700}
.admin-bar-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-add{background:#FCD34D;color:#1F3864;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:inherit}
.btn-add:hover{background:#FDE68A}
.admin-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1.5px solid #E2E8F0}
.admin-section-title{font-size:13px;font-weight:800;color:#1F3864;margin-bottom:12px}
.fb-config-area{width:100%;font-family:monospace;font-size:11.5px;padding:10px;border:1.5px solid #CBD5E1;border-radius:8px;resize:vertical;min-height:130px;outline:none;background:#F8FAFC}
.fb-config-area:focus{border-color:#FFA000}
.fb-status-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px}
.fb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fb-dot.offline{background:#94A3B8}.fb-dot.connecting{background:#FCD34D}.fb-dot.connected{background:#22C55E}.fb-dot.error{background:#EF4444}
.admin-list{display:flex;flex-direction:column;gap:8px}
.admin-item{background:#fff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.admin-item-icon{font-size:24px;flex-shrink:0;width:40px;text-align:center}
.admin-item-info{flex:1;min-width:0}
.admin-item-title{font-size:13.5px;font-weight:700;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-meta{font-size:11px;color:#94A3B8;margin-top:2px}
.admin-item-actions{display:flex;gap:5px;flex-shrink:0}
.drag-handle{cursor:grab;color:#CBD5E1;font-size:16px;flex-shrink:0;user-select:none}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-height:160px;overflow-y:auto;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px}
.icon-opt{font-size:22px;text-align:center;padding:6px;border-radius:6px;cursor:pointer;transition:background .12s}
.icon-opt:hover,.icon-opt.selected{background:#DBEAFE}
.color-grid{display:flex;gap:6px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:640px){
  .hdr-title{font-size:17px}.hdr-emblem{width:42px;height:42px;font-size:20px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card{padding:14px 12px 12px}.card-icon{font-size:28px}.card-title{font-size:13.5px}.card-desc{display:none}
  .toolbar{padding:12px 12px 0}.grid-wrap{padding:12px 12px 32px}.admin-panel{padding:0 12px 32px}
  .form-row-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <div class="hdr-logo">
        <div class="hdr-emblem">🏛️</div>
        <div>
          <div class="hdr-title">행정처 종합민원시스템</div>
          <div class="hdr-sub">General Affairs Office · Integrated Service Portal</div>
        </div>
      </div>
      <div class="hdr-right">
        <div class="fb-badge offline" id="fb-badge">🔴 Firebase 미연결</div>
        <button class="hdr-admin-btn" onclick="openAdminLogin()">🔒 관리자</button>
      </div>
    </div>
    <div class="hdr-notice">
      <span class="dot"></span>
      <span id="notice-text">공지사항이 없습니다.</span>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="서비스 검색..." oninput="renderCards()">
  </div>
  <div class="filter-btns" id="filter-btns"></div>
</div>

<div class="grid-wrap"><div class="card-grid" id="card-grid"></div></div>

<!-- ADMIN PANEL -->
<div class="admin-panel hidden" id="admin-panel">
  <div class="admin-bar">
    <div class="admin-bar-title">🔧 관리자 페이지</div>
    <div class="admin-bar-actions">
      <button class="btn-add" onclick="openCardForm()">➕ 카드 추가</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="openCategoryManager()">🏷️ 카테고리</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="openNoticeEdit()">📢 공지</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="exitAdmin()">나가기</button>
    </div>
  </div>

  <!-- Firebase 연동 -->
  <div class="admin-section">
    <div class="admin-section-title">🔥 Firebase 연동 설정</div>
    <div style="font-size:12px;color:#64748B;margin-bottom:10px;line-height:1.7">
      Firebase 콘솔에서 복사한 <strong>firebaseConfig</strong> 내용을 아래에 붙여넣으세요.<br>
      연결하면 카드·카테고리·공지가 모든 기기에서 실시간으로 동기화됩니다.
    </div>
    <textarea class="fb-config-area" id="fb-config-input" placeholder='{
  "apiKey": "AIzaSy...",
  "authDomain": "your-project.firebaseapp.com",
  "projectId": "your-project-id",
  "storageBucket": "your-project.appspot.com",
  "messagingSenderId": "123456789",
  "appId": "1:123456789:web:abcdef"
}'></textarea>
    <div class="fb-status-row">
      <div class="fb-dot offline" id="fb-dot"></div>
      <span id="fb-status-text" style="color:#64748B">미연결 — Firebase 설정을 입력하고 연결하기를 누르세요</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn-fb" onclick="connectFirebase()">🔌 연결하기</button>
      <button class="btn btn-g" onclick="disconnectFirebase()">연결 해제</button>
      <button class="btn btn-g" onclick="pushAllToFirebase()">⬆️ 현재 데이터 업로드</button>
    </div>
  </div>

  <!-- Card List -->
  <div class="admin-section">
    <div class="admin-section-title">📋 카드 목록 (드래그로 순서 변경)</div>
    <div class="admin-list" id="admin-list"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-box">
    <div class="modal-hd"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ICONS=['📄','📋','📝','📑','🗂️','🗃️','🏖️','🎓','💼','🏥','🏦','🔖','📬','🎯','🧾','💰','🏠','🚗','📅','✅','🔔','📊','👤','👥','🏆','📌','🔧','📞','💡','🎁','🛠️','📦','🔐','🌐','📲','🖥️'];
const COLORS=[
  {bg:'#EFF6FF',text:'#1D4ED8',label:'파랑'},{bg:'#F0FDF4',text:'#15803D',label:'초록'},
  {bg:'#FFF7ED',text:'#C2410C',label:'주황'},{bg:'#FDF4FF',text:'#7E22CE',label:'보라'},
  {bg:'#FFF1F2',text:'#BE123C',label:'빨강'},{bg:'#F0FDFA',text:'#0F766E',label:'청록'},
  {bg:'#FFFBEB',text:'#92400E',label:'노랑'},{bg:'#F8FAFC',text:'#334155',label:'회색'},
];
const DEFAULT_CARDS=[
  {id:'c1',icon:'📄',title:'재직증명서 발급',desc:'재직 사실 확인을 위한 증명서를 신청합니다.',category:'증명서',color:0,link:'#',isNew:false},
  {id:'c2',icon:'📋',title:'경력증명서 발급',desc:'근무 기간 및 경력을 증명하는 서류를 신청합니다.',category:'증명서',color:0,link:'#',isNew:false},
  {id:'c3',icon:'💰',title:'급여명세서 조회',desc:'월별 급여 내역 및 세금 공제 현황을 확인합니다.',category:'급여',color:1,link:'#',isNew:false},
  {id:'c4',icon:'🏖️',title:'휴가 신청',desc:'연차, 반차, 특별휴가 등 각종 휴가를 신청합니다.',category:'휴가',color:5,link:'#',isNew:false},
  {id:'c5',icon:'📅',title:'연차 잔여 조회',desc:'잔여 연차 및 사용 내역을 확인합니다.',category:'휴가',color:5,link:'#',isNew:false},
  {id:'c6',icon:'🎓',title:'교육 신청',desc:'직무 교육, 법정 의무 교육 등 사내외 교육을 신청합니다.',category:'교육',color:3,link:'#',isNew:true},
  {id:'c7',icon:'🎁',title:'복리후생 신청',desc:'식비, 교통비, 경조사비 등 복리후생을 신청합니다.',category:'복리후생',color:2,link:'#',isNew:false},
  {id:'c8',icon:'🏥',title:'건강검진 신청',desc:'연간 건강검진 일정 예약 및 신청을 진행합니다.',category:'복리후생',color:4,link:'#',isNew:false},
  {id:'c9',icon:'🏠',title:'사내 시설 예약',desc:'회의실, 세미나실, 공용 공간 예약을 신청합니다.',category:'시설',color:7,link:'#',isNew:false},
  {id:'c10',icon:'🚗',title:'업무용 차량 예약',desc:'업무용 차량 및 주차 스티커 발급을 신청합니다.',category:'시설',color:7,link:'#',isNew:false},
  {id:'c11',icon:'📝',title:'인사 서류 제출',desc:'각종 인사 관련 서류를 제출하고 접수 현황을 확인합니다.',category:'인사',color:6,link:'#',isNew:false},
  {id:'c12',icon:'🔔',title:'업무 환경 민원',desc:'근무 환경 개선 요청 및 시설 불편 사항을 접수합니다.',category:'민원',color:4,link:'#',isNew:false},
];
const ADMIN_ID='admin', ADMIN_PW='1234';
const FB_COL='civil_service', FB_DOC='data';

let cards=[],categories=[],adminMode=false,editingId=null,activeFilter='all',noticeText='';
let _selIcon='📄',_selColor=0,_dragId=null;
let fbApp=null,fbDb=null,fbStatus='offline',fbUnsubscribe=null,fbSyncLock=false;

// ── localStorage ──
function saveToLocal(){
  try{
    localStorage.setItem('cs_cards',JSON.stringify(cards));
    localStorage.setItem('cs_categories',JSON.stringify(categories));
    localStorage.setItem('cs_notice',noticeText);
  }catch(e){}
}
function loadFromLocal(){
  try{
    const c=localStorage.getItem('cs_cards'),cat=localStorage.getItem('cs_categories'),n=localStorage.getItem('cs_notice');
    cards=c?JSON.parse(c):JSON.parse(JSON.stringify(DEFAULT_CARDS));
    categories=cat?JSON.parse(cat):[...new Set(DEFAULT_CARDS.map(x=>x.category))];
    if(n!==null)noticeText=n;
  }catch(e){cards=JSON.parse(JSON.stringify(DEFAULT_CARDS));categories=[...new Set(DEFAULT_CARDS.map(x=>x.category))];}
}

// ── Firebase ──
function updateFbBadge(){
  const m={offline:{b:'offline',t:'🔴 Firebase 미연결',d:'미연결 — Firebase 설정을 입력하고 연결하기를 누르세요'},
           connecting:{b:'connecting',t:'🟡 연결 중...',d:'Firebase에 연결 중입니다...'},
           connected:{b:'connected',t:'🟢 Firebase 연결됨',d:'모든 기기에서 실시간 동기화 중'},
           error:{b:'error',t:'🔴 연결 오류',d:'설정을 확인하고 다시 시도해주세요'}};
  const i=m[fbStatus]||m.offline;
  const b=document.getElementById('fb-badge'),dot=document.getElementById('fb-dot'),tx=document.getElementById('fb-status-text');
  if(b){b.className=`fb-badge ${i.b}`;b.textContent=i.t;}
  if(dot)dot.className=`fb-dot ${i.b}`;
  if(tx)tx.textContent=i.d;
}

async function connectFirebase(){
  const raw=(document.getElementById('fb-config-input')?.value||'').trim();
  if(!raw){toast('Firebase 설정을 입력하세요','warn');return;}
  let cfg;
  try{cfg=JSON.parse(raw.replace(/([{,]\s*)([a-zA-Z_]\w*)(\s*:)/g,'$1"$2"$3'));}
  catch(e){toast('JSON 형식이 올바르지 않습니다','err');return;}
  fbStatus='connecting';updateFbBadge();
  try{
    if(fbApp)try{await fbApp.delete();}catch(e){}
    fbApp=firebase.initializeApp(cfg,'cs_'+Date.now());
    fbDb=fbApp.firestore();
    await fbDb.collection(FB_COL).doc('_ping').set({ts:Date.now()});
    fbStatus='connected';updateFbBadge();
    localStorage.setItem('cs_fb_config',raw);
    toast('✅ Firebase 연결 성공!');
    await loadFromFirebase();
    subscribeFirebase();
    renderAll();
  }catch(e){fbStatus='error';updateFbBadge();toast('연결 실패: '+e.message,'err');}
}

function disconnectFirebase(){
  if(fbUnsubscribe){fbUnsubscribe();fbUnsubscribe=null;}
  if(fbApp)try{fbApp.delete();}catch(e){}
  fbApp=null;fbDb=null;fbStatus='offline';updateFbBadge();
  localStorage.removeItem('cs_fb_config');
  const el=document.getElementById('fb-config-input');if(el)el.value='';
  toast('Firebase 연결 해제됨');
}

async function loadFromFirebase(){
  if(!fbDb||fbStatus!=='connected')return;
  try{
    const doc=await fbDb.collection(FB_COL).doc(FB_DOC).get();
    if(doc.exists){
      const d=doc.data();
      if(d.cards?.length)cards=d.cards;
      if(d.categories?.length)categories=d.categories;
      if(d.notice!==undefined)noticeText=d.notice;
      saveToLocal();
    }
  }catch(e){}
}

async function saveToFirebase(){
  if(!fbDb||fbStatus!=='connected'||fbSyncLock)return;
  fbSyncLock=true;
  try{await fbDb.collection(FB_COL).doc(FB_DOC).set({cards,categories,notice:noticeText,updatedAt:Date.now()});}
  catch(e){}finally{setTimeout(()=>fbSyncLock=false,500);}
}

async function pushAllToFirebase(){
  if(!fbDb||fbStatus!=='connected'){toast('Firebase에 연결되어 있지 않습니다','warn');return;}
  toast('Firebase에 업로드 중...');
  await saveToFirebase();
  toast('✅ Firebase 업로드 완료');
}

function subscribeFirebase(){
  if(!fbDb)return;
  if(fbUnsubscribe)fbUnsubscribe();
  fbUnsubscribe=fbDb.collection(FB_COL).doc(FB_DOC).onSnapshot(doc=>{
    if(fbSyncLock)return;
    if(doc.exists){
      const d=doc.data();
      if(d.cards?.length)cards=d.cards;
      if(d.categories?.length)categories=d.categories;
      if(d.notice!==undefined)noticeText=d.notice;
      saveToLocal();renderNotice();renderAll();
    }
  });
}

function save(){saveToLocal();saveToFirebase();}

// ── Render ──
function getCategories(){const e=cards.map(c=>c.category).filter(c=>!categories.includes(c));return[...categories,...e];}

function renderFilters(){
  const cats=getCategories();
  document.getElementById('filter-btns').innerHTML=
    `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">전체</button>`
    +cats.map(c=>`<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}
function setFilter(f){activeFilter=f;renderFilters();renderCards();}

function renderCards(){
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  const grid=document.getElementById('card-grid');
  const filtered=cards.filter(c=>(activeFilter==='all'||c.category===activeFilter)&&(!q||c.title.toLowerCase().includes(q)||(c.desc||'').toLowerCase().includes(q)));
  if(!filtered.length){grid.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">🔍</div><div style="font-size:14px">검색 결과가 없습니다</div></div>';return;}
  grid.innerHTML=filtered.map(c=>{
    const col=COLORS[c.color||0];
    return `<a class="card" href="${c.link&&c.link!=='#'?c.link:'javascript:void(0)'}" ${c.link&&c.link!=='#'?'target="_blank" rel="noopener"':''} onclick="${!c.link||c.link==='#'?`event.preventDefault();showLinkHint('${c.id}')`:''}" >
      ${c.isNew?'<div class="card-new">NEW</div>':''}
      <div class="card-badge" style="background:${col.bg};color:${col.text}">${c.category}</div>
      <div class="card-icon">${c.icon}</div>
      <div class="card-title">${escH(c.title)}</div>
      <div class="card-desc">${escH(c.desc||'')}</div>
      <div class="card-footer"><span class="card-link-label">바로가기 →</span></div>
    </a>`;
  }).join('');
}

function showLinkHint(id){
  const c=cards.find(x=>x.id===id);if(!c)return;
  if(adminMode){openCardForm(id);return;}
  showModal(`${c.icon} ${c.title}`,
    `<div style="color:#64748B;font-size:13px;line-height:1.7;margin-bottom:16px">${escH(c.desc||'')}</div>
     <div style="background:#F8FAFC;border-radius:8px;padding:12px;font-size:12.5px;color:#94A3B8">⚠️ 연결된 링크가 없습니다.</div>`,
    `<button class="btn btn-p" onclick="closeModal()">확인</button>`);
}

function renderNotice(){
  const el=document.getElementById('notice-text');
  el.textContent=noticeText?.trim()||'공지사항이 없습니다. 관리자 페이지에서 공지를 등록할 수 있습니다.';
}
function renderAll(){renderFilters();renderCards();if(adminMode)renderAdminList();}

// ── Admin Login ──
function openAdminLogin(){
  if(adminMode){exitAdmin();return;}
  showModal('🔒 관리자 로그인',
    `<div class="form-row"><label>아이디</label>
       <input type="text" id="id-input" placeholder="아이디" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pw-input')?.focus()">
     </div>
     <div class="form-row"><label>비밀번호</label>
       <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPw()">
       <div class="pw-hint">초기 아이디: admin · 초기 비밀번호: 1234</div>
     </div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button><button class="btn btn-p" onclick="checkPw()">로그인</button>`);
  setTimeout(()=>document.getElementById('id-input')?.focus(),100);
}

function checkPw(){
  const id=(document.getElementById('id-input')?.value||'').trim(),pw=document.getElementById('pw-input')?.value||'';
  if(id===ADMIN_ID&&pw===ADMIN_PW){closeModal();enterAdmin();}
  else if(id!==ADMIN_ID){toast('아이디가 올바르지 않습니다','err');document.getElementById('id-input')?.select();}
  else{toast('비밀번호가 틀렸습니다','err');document.getElementById('pw-input')?.select();}
}

function enterAdmin(){
  adminMode=true;
  document.getElementById('admin-panel').classList.remove('hidden');
  document.querySelector('.hdr-admin-btn').textContent='✅ 관리자 모드';
  const saved=localStorage.getItem('cs_fb_config');
  if(saved){const el=document.getElementById('fb-config-input');if(el)el.value=saved;if(fbStatus!=='connected')connectFirebase();}
  renderAdminList();toast('관리자 모드 진입');
}

function exitAdmin(){
  adminMode=false;
  document.getElementById('admin-panel').classList.add('hidden');
  document.querySelector('.hdr-admin-btn').innerHTML='🔒 관리자';
  toast('관리자 모드 종료');
}

function renderAdminList(){
  const list=document.getElementById('admin-list');if(!list)return;
  if(!cards.length){list.innerHTML='<div style="text-align:center;padding:24px;color:#94A3B8;font-size:13px">카드가 없습니다.</div>';return;}
  list.innerHTML=cards.map(c=>{
    const col=COLORS[c.color||0];
    return `<div class="admin-item" draggable="true" ondragstart="dragStart(event,'${c.id}')" ondragover="dragOver(event)" ondrop="dragDrop(event,'${c.id}')">
      <span class="drag-handle">⠿</span>
      <div class="admin-item-icon">${c.icon}</div>
      <div class="admin-item-info">
        <div class="admin-item-title">${escH(c.title)}${c.isNew?' <span style="background:#EF4444;color:#fff;font-size:9px;padding:1px 5px;border-radius:6px;vertical-align:middle">NEW</span>':''}</div>
        <div class="admin-item-meta"><span style="background:${col.bg};color:${col.text};padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">${c.category}</span> ${c.link&&c.link!=='#'?'🔗 링크 있음':'⚠️ 링크 없음'}</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn btn-g btn-sm" onclick="openCardForm('${c.id}')">✏️</button>
        <button class="btn btn-r btn-sm" onclick="deleteCard('${c.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── Card Form ──
function openCardForm(id){
  editingId=id||null;const c=id?cards.find(x=>x.id===id):null;
  _selIcon=c?.icon||'📄';_selColor=c?.color??0;
  const ig=ICONS.map(ic=>`<div class="icon-opt ${ic===_selIcon?'selected':''}" onclick="selectIcon('${ic}')">${ic}</div>`).join('');
  const cg=COLORS.map((col,i)=>`<div class="color-opt ${i===_selColor?'selected':''}" style="background:${col.bg};border:3px solid ${i===_selColor?'#1F3864':col.bg}" onclick="selectColor(${i})" title="${col.label}"></div>`).join('');
  showModal(id?'✏️ 카드 수정':'➕ 카드 추가',
    `<div class="form-row"><label>아이콘</label><div class="icon-grid">${ig}</div>
       <div style="margin-top:6px;display:flex;align-items:center;gap:8px"><span id="sel-icon-preview" style="font-size:28px">${_selIcon}</span><span style="font-size:12px;color:#94A3B8">선택된 아이콘</span></div>
     </div>
     <div class="form-row"><label>서비스명 *</label><input id="f-title" value="${escA(c?.title||'')}" placeholder="예: 재직증명서 발급"></div>
     <div class="form-row"><label>설명</label><textarea id="f-desc">${escA(c?.desc||'')}</textarea></div>
     <div class="form-row-2">
       <div class="form-row" style="margin:0"><label>카테고리 *</label>
         <input id="f-cat" value="${escA(c?.category||'')}" list="cat-list" placeholder="예: 증명서">
         <datalist id="cat-list">${getCategories().map(x=>`<option value="${escA(x)}">`).join('')}</datalist>
       </div>
       <div class="form-row" style="margin:0"><label>배지 색상</label><div class="color-grid">${cg}</div></div>
     </div>
     <div class="form-row"><label>링크 URL</label><input id="f-link" value="${escA(c?.link&&c.link!=='#'?c.link:'')}" placeholder="https://..."></div>
     <div class="form-row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal"><input type="checkbox" id="f-new" ${c?.isNew?'checked':''}> NEW 배지 표시</label></div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>${id?`<button class="btn btn-r" onclick="deleteCard('${id}');closeModal()">삭제</button>`:''}
     <button class="btn btn-p" onclick="saveCard()">${id?'저장':'추가'}</button>`);
}

function selectIcon(ic){_selIcon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('selected',el.textContent===ic));document.getElementById('sel-icon-preview').textContent=ic;}
function selectColor(i){_selColor=i;document.querySelectorAll('.color-opt').forEach((el,idx)=>{el.style.border=`3px solid ${idx===i?'#1F3864':COLORS[idx].bg}`;el.classList.toggle('selected',idx===i);});}

function saveCard(){
  const title=(document.getElementById('f-title')?.value||'').trim();
  const desc=(document.getElementById('f-desc')?.value||'').trim();
  const cat=(document.getElementById('f-cat')?.value||'').trim();
  const link=(document.getElementById('f-link')?.value||'').trim();
  const isNew=document.getElementById('f-new')?.checked||false;
  if(!title){toast('서비스명을 입력하세요','warn');return;}
  if(!cat){toast('카테고리를 입력하세요','warn');return;}
  if(editingId){const c=cards.find(x=>x.id===editingId);if(c){c.icon=_selIcon;c.title=title;c.desc=desc;c.category=cat;c.link=link||'#';c.isNew=isNew;c.color=_selColor;}toast('✅ 카드 수정 완료');}
  else{cards.push({id:'c'+Date.now(),icon:_selIcon,title,desc,category:cat,link:link||'#',isNew,color:_selColor});toast('✅ 카드 추가 완료');}
  save();closeModal();renderAll();
}

function deleteCard(id){if(!confirm('이 카드를 삭제할까요?'))return;cards=cards.filter(c=>c.id!==id);save();renderAll();toast('삭제됨');}

// ── Category Manager ──
function openCategoryManager(){_renderCategoryModal();}
function _renderCategoryModal(){
  const cats=getCategories();
  const listHtml=cats.length===0?'<div style="text-align:center;padding:16px;color:#94A3B8;font-size:12.5px">카테고리가 없습니다</div>'
    :cats.map(cat=>{const cnt=cards.filter(c=>c.category===cat).length;return `<div style="display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid #E2E8F0;border-radius:8px;background:#F8FAFC;margin-bottom:6px">
      <div style="flex:1;font-size:13.5px;font-weight:700">${escH(cat)}</div>
      <div style="font-size:11px;color:#94A3B8">${cnt}개</div>
      <button class="btn btn-g btn-sm" onclick="openRenameCategory('${escA(cat)}')">✏️ 이름 변경</button>
      <button class="btn btn-r btn-sm" onclick="deleteCategoryPrompt('${escA(cat)}')">🗑</button>
    </div>`;}).join('');
  showModal('🏷️ 카테고리 관리',listHtml+
    `<div style="background:#F0F9FF;border:1px solid #BAE6FD;border-radius:8px;padding:12px;margin-top:10px">
       <div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:8px">➕ 새 카테고리 추가</div>
       <div style="display:flex;gap:8px">
         <input id="new-cat-input" placeholder="카테고리 이름" style="flex:1;padding:8px 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')addCategory()">
         <button class="btn btn-p" onclick="addCategory()">추가</button>
       </div>
     </div>`,
    `<div></div><button class="btn btn-p" onclick="closeModal()">닫기</button>`);
}
function addCategory(){const name=(document.getElementById('new-cat-input')?.value||'').trim();if(!name){toast('카테고리 이름을 입력하세요','warn');return;}if(getCategories().includes(name)){toast('이미 있는 카테고리입니다','warn');return;}categories.push(name);save();renderFilters();toast(`✅ "${name}" 추가`);_renderCategoryModal();}
function openRenameCategory(on){showModal('✏️ 카테고리 이름 변경',`<div class="form-row"><label>현재 이름</label><input value="${escA(on)}" disabled style="background:#F8FAFC;color:#94A3B8"></div><div class="form-row"><label>새 이름 *</label><input id="rename-cat-input" value="${escA(on)}" onkeydown="if(event.key==='Enter')renameCategory('${escA(on)}')"><div style="font-size:11px;color:#64748B;margin-top:4px">이 카테고리를 사용하는 모든 카드에 자동 반영됩니다</div></div>`,`<button class="btn btn-g" onclick="openCategoryManager()">취소</button><button class="btn btn-p" onclick="renameCategory('${escA(on)}')">저장</button>`);setTimeout(()=>{const el=document.getElementById('rename-cat-input');if(el){el.focus();el.select();}},100);}
function renameCategory(on){const nn=(document.getElementById('rename-cat-input')?.value||'').trim();if(!nn){toast('이름을 입력하세요','warn');return;}if(nn===on){openCategoryManager();return;}if(getCategories().filter(c=>c!==on).includes(nn)){toast('이미 있는 카테고리입니다','warn');return;}const i=categories.indexOf(on);if(i>=0)categories[i]=nn;else categories.push(nn);cards.forEach(c=>{if(c.category===on)c.category=nn;});if(activeFilter===on)activeFilter=nn;save();renderAll();toast(`✅ "${on}" → "${nn}"`);openCategoryManager();}
function deleteCategoryPrompt(cat){const cnt=cards.filter(c=>c.category===cat).length,oth=getCategories().filter(c=>c!==cat);const ro=oth.length>0?`<div class="form-row" style="margin-top:10px"><label>카드(${cnt}개)를 다른 카테고리로 이동:</label><select id="reassign-cat"><option value="__delete__" style="color:#DC2626">카드도 함께 삭제</option>${oth.map(c=>`<option value="${escA(c)}">${escH(c)}</option>`).join('')}</select></div>`:`<div style="background:#FEE2E2;border-radius:8px;padding:10px;font-size:12.5px;color:#DC2626;margin-top:10px">⚠️ 카드 ${cnt}개도 함께 삭제됩니다.</div>`;showModal('🗑 카테고리 삭제',`<div style="font-size:13px"><strong>"${escH(cat)}"</strong> 삭제</div><div style="font-size:12px;color:#64748B">${cnt}개 카드 있음</div>${ro}`,`<button class="btn btn-g" onclick="openCategoryManager()">취소</button><button class="btn btn-r" onclick="deleteCategory('${escA(cat)}')">삭제</button>`);}
function deleteCategory(cat){const sel=document.getElementById('reassign-cat')?.value;if(sel==='__delete__'||!sel)cards=cards.filter(c=>c.category!==cat);else cards.forEach(c=>{if(c.category===cat)c.category=sel;});categories=categories.filter(c=>c!==cat);if(activeFilter===cat)activeFilter='all';save();renderAll();toast(`"${cat}" 삭제됨`);openCategoryManager();}

// ── Notice ──
function openNoticeEdit(){showModal('📢 공지 수정',`<div class="form-row"><label>공지 내용 (비워두면 숨김)</label><textarea id="f-notice" rows="3">${escA(noticeText)}</textarea></div>`,`<button class="btn btn-g" onclick="closeModal()">취소</button><button class="btn btn-p" onclick="saveNotice()">저장</button>`);}
function saveNotice(){noticeText=(document.getElementById('f-notice')?.value||'').trim();save();renderNotice();closeModal();toast('✅ 공지 업데이트');}

// ── Drag ──
function dragStart(e,id){_dragId=id;e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();}
function dragDrop(e,id){e.preventDefault();if(!_dragId||_dragId===id)return;const f=cards.findIndex(c=>c.id===_dragId),t=cards.findIndex(c=>c.id===id);if(f<0||t<0)return;const[item]=cards.splice(f,1);cards.splice(t,0,item);save();renderAdminList();renderCards();_dragId=null;}

// ── Modal ──
function showModal(title,body,foot){document.getElementById('modal-title').innerHTML=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-foot').innerHTML=foot||'';document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});

// ── Toast ──
let _tt;
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?'#DC2626':type==='warn'?'#D97706':'#1E293B';el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);}

// ── Utils ──
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Init ──
loadFromLocal();renderNotice();renderAll();updateFbBadge();
(async()=>{const saved=localStorage.getItem('cs_fb_config');if(saved&&fbStatus==='offline'){const el=document.getElementById('fb-config-input');if(el)el.value=saved;await connectFirebase();}})();
</script>
</body>
</html>
