<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정처 종합민원시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#F0F4F8;min-height:100vh;color:#1E293B}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1F3864 0%,#2E74B5 100%);color:#fff;padding:0}
.hdr-inner{max-width:1200px;margin:0 auto;padding:24px 20px 20px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:14px}
.hdr-emblem{width:52px;height:52px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.hdr-sub{font-size:12px;opacity:.75;margin-top:3px;font-weight:400}
.hdr-admin-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.hdr-admin-btn:hover{background:rgba(255,255,255,.25)}
.hdr-notice{background:rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;margin-top:14px;font-size:12px;display:flex;align-items:center;gap:8px}
.hdr-notice .dot{width:6px;height:6px;border-radius:50%;background:#FCD34D;flex-shrink:0;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SEARCH + FILTER */
.toolbar{max-width:1200px;margin:0 auto;padding:18px 20px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid #CBD5E1;border-radius:10px;font-size:13.5px;font-family:inherit;background:#fff;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:#2E74B5}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:15px;pointer-events:none}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:8px 14px;border:1.5px solid #CBD5E1;border-radius:8px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#475569;transition:all .15s;white-space:nowrap}
.filter-btn.active,.filter-btn:hover{background:#1F3864;color:#fff;border-color:#1F3864}

/* CARD GRID */
.grid-wrap{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:22px 20px 18px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;border:2px solid transparent;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:0}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:#2E74B5}
.card-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;margin-bottom:12px;width:fit-content}
.card-icon{font-size:36px;margin-bottom:10px;line-height:1}
.card-title{font-size:15.5px;font-weight:800;color:#1E293B;margin-bottom:6px;line-height:1.3}
.card-desc{font-size:12.5px;color:#64748B;line-height:1.6;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid #F1F5F9}

.card-lock{position:absolute;top:10px;right:10px;font-size:15px;opacity:.7}
.card{position:relative;cursor:pointer;}

.card-link-label{font-size:12px;font-weight:700;color:#2E74B5;display:flex;align-items:center;gap:4px}
.card-arrow{font-size:14px;color:#2E74B5}
.card-new{position:absolute;top:14px;right:14px;background:#EF4444;color:#fff;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:10px}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:#94A3B8;grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px}

/* MODAL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hd{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:800;color:#1E293B}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94A3B8;padding:4px;line-height:1}
.modal-body{padding:16px 20px 20px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:5px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:9px 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:#2E74B5}
.form-row textarea{resize:vertical;min-height:70px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 20px}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-p{background:#1F3864;color:#fff}.btn-p:hover{background:#2E74B5}
.btn-g{background:#F1F5F9;color:#475569}.btn-g:hover{background:#E2E8F0}
.btn-r{background:#FEE2E2;color:#DC2626}.btn-r:hover{background:#FECACA}
.btn-sm{padding:5px 12px;font-size:12px}
.pw-hint{font-size:11px;color:#94A3B8;margin-top:4px}

/* ADMIN PANEL */
.admin-panel{max-width:1200px;margin:0 auto;padding:0 20px 40px}
.admin-panel.hidden{display:none}
.admin-bar{background:#1F3864;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.admin-bar-title{color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.admin-bar-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-add{background:#FCD34D;color:#1F3864;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn-add:hover{background:#FDE68A}
.btn-exit{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-exit:hover{background:rgba(255,255,255,.25)}

/* ADMIN CARD LIST */
.admin-list{display:flex;flex-direction:column;gap:8px}
.admin-item{background:#fff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.admin-item-icon{font-size:24px;flex-shrink:0;width:40px;text-align:center}
.admin-item-info{flex:1;min-width:0}
.admin-item-title{font-size:13.5px;font-weight:700;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-meta{font-size:11px;color:#94A3B8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-actions{display:flex;gap:5px;flex-shrink:0}
.drag-handle{cursor:grab;color:#CBD5E1;font-size:16px;flex-shrink:0;user-select:none}

/* ICON PICKER */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-height:160px;overflow-y:auto;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px}
.icon-opt{font-size:22px;text-align:center;padding:6px;border-radius:6px;cursor:pointer;transition:background .12s}
.icon-opt:hover,.icon-opt.selected{background:#DBEAFE}

/* COLOR PICKER */
.color-grid{display:flex;gap:6px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:border .12s}
.color-opt.selected{border-color:#1F3864}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:640px){
  .hdr-title{font-size:17px}
  .hdr-emblem{width:42px;height:42px;font-size:20px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card{padding:14px 12px 12px}
  .card-icon{font-size:28px;margin-bottom:6px}
  .card-title{font-size:13.5px}
  .card-desc{display:none}
  .toolbar{padding:12px 12px 0}
  .grid-wrap{padding:12px 12px 32px}
  .admin-panel{padding:0 12px 32px}
  .form-row-2{grid-template-columns:1fr}
}
@media(max-width:400px){
  .card-grid{grid-template-columns:1fr 1fr}
}
</style>

<script>
// ── Supabase ─────────────────────────────────────────────
const _SB_URL = 'https://dhvesnfohfinohtwvaqz.supabase.co';
const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRodmVzbmZvaGZpbm9odHd2YXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDg2MzUsImV4cCI6MjA5NTUyNDYzNX0.Cof6JVNw05suj19UVEkqksFL9gb4ZltzYVg_8E9UUqc';
const _sbClient = (typeof window!=='undefined'&&window.supabase)
  ? window.supabase.createClient(_SB_URL,_SB_KEY) : null;
const csDB = _sbClient ? _sbClient.schema('civil_service') : null;
let _dbOk = null;
let portalId = '';
let portalPw = '';
// ──────────────────────────────────────────────────────────

// ── DATA ──────────────────────────────────────────────────────
const ICONS = ['📄','📋','📝','📑','🗂️','🗃️','🏖️','🎓','💼','🏥','🏦','🔖','📬','🎯','🧾','💰','🏠','🚗','📅','✅','🔔','📊','👤','👥','🏆','📌','🔧','📞','💡','🎁','🛠️','📦','🔐','🌐','📲','🖥️'];
const COLORS = [
  {bg:'#EFF6FF',text:'#1D4ED8',label:'파랑'},
  {bg:'#F0FDF4',text:'#15803D',label:'초록'},
  {bg:'#FFF7ED',text:'#C2410C',label:'주황'},
  {bg:'#FDF4FF',text:'#7E22CE',label:'보라'},
  {bg:'#FFF1F2',text:'#BE123C',label:'빨강'},
  {bg:'#F0FDFA',text:'#0F766E',label:'청록'},
  {bg:'#FFFBEB',text:'#92400E',label:'노랑'},
  {bg:'#F8FAFC',text:'#334155',label:'회색'},
];

const DEFAULT_CARDS = [
  {id:'c1',icon:'📄',title:'재직증명서 발급',desc:'재직 사실 확인을 위한 증명서를 신청합니다.',category:'증명서',color:0,link:'#',isNew:false,requiresLogin:false},
  {id:'c2',icon:'📋',title:'경력증명서 발급',desc:'근무 기간 및 경력을 증명하는 서류를 신청합니다.',category:'증명서',color:0,link:'#',isNew:false,requiresLogin:false},
  {id:'c3',icon:'💰',title:'급여명세서 조회',desc:'월별 급여 내역 및 세금 공제 현황을 확인합니다.',category:'급여',color:1,link:'#',isNew:false,requiresLogin:false},
  {id:'c4',icon:'🏖️',title:'휴가 신청',desc:'연차, 반차, 특별휴가 등 각종 휴가를 신청합니다.',category:'휴가',color:5,link:'#',isNew:false,requiresLogin:false},
  {id:'c5',icon:'📅',title:'연차 잔여 조회',desc:'잔여 연차 및 사용 내역을 확인합니다.',category:'휴가',color:5,link:'#',isNew:false,requiresLogin:false},
  {id:'c6',icon:'🎓',title:'교육 신청',desc:'직무 교육, 법정 의무 교육 등 사내외 교육을 신청합니다.',category:'교육',color:3,link:'#',isNew:true,requiresLogin:false},
  {id:'c7',icon:'🎁',title:'복리후생 신청',desc:'식비, 교통비, 경조사비 등 복리후생을 신청합니다.',category:'복리후생',color:2,link:'#',isNew:false,requiresLogin:false},
  {id:'c8',icon:'🏥',title:'건강검진 신청',desc:'연간 건강검진 일정 예약 및 신청을 진행합니다.',category:'복리후생',color:4,link:'#',isNew:false,requiresLogin:false},
  {id:'c9',icon:'🏠',title:'사내 시설 예약',desc:'회의실, 세미나실, 공용 공간 예약을 신청합니다.',category:'시설',color:7,link:'#',isNew:false,requiresLogin:false},
  {id:'c10',icon:'🚗',title:'업무용 차량 예약',desc:'업무용 차량 및 주차 스티커 발급을 신청합니다.',category:'시설',color:7,link:'#',isNew:false,requiresLogin:false},
  {id:'c11',icon:'📝',title:'인사 서류 제출',desc:'각종 인사 관련 서류를 제출하고 접수 현황을 확인합니다.',category:'인사',color:6,link:'#',isNew:false,requiresLogin:false},
  {id:'c12',icon:'🔔',title:'업무 환경 민원',desc:'근무 환경 개선 요청 및 시설 불편 사항을 접수합니다.',category:'민원',color:4,link:'#',isNew:false,requiresLogin:false},
];

let cards = [];
let categories = [];
let adminMode = false;
let editingId = null;
let activeFilter = 'all';
const ADMIN_ID = 'admin';
const ADMIN_PW = '1234';
let noticeText = '';


function updateDbStatus(){
  const el = document.getElementById('_dbStatus');
  if(!el) return;
  el.textContent = (_dbOk===null) ? '' : (_dbOk ? '☁️ 클라우드 연결됨' : '⚠️ 로컬 저장만 됨');
  el.style.color  = (_dbOk===null) ? '' : (_dbOk ? '#15803D' : '#DC2626');
}
async function save(){
  if(!csDB){
    localStorage.setItem('cs_cards', JSON.stringify(cards));
    localStorage.setItem('cs_notice', noticeText);
    return;
  }
  async function _upsertCards(withRL){
    const rows = cards.map((c,i)=>{
      const r={id:c.id,icon:c.icon,title:c.title,description:c.desc||'',
        category:c.category,color_index:c.color??0,link_url:c.link||'#',
        is_new:c.isNew||false,sort_order:i};
      if(withRL) r.requires_login=c.requiresLogin||false;
      return r;
    });
    return csDB.from('service_cards').upsert(rows);
  }
  try{
    let res = await _upsertCards(true);
    if(res.error && res.error.message && res.error.message.includes('requires_login')){
      res = await _upsertCards(false);
    }
    if(res.error) throw res.error;
    const {error:e2} = await csDB.from('settings').upsert({key:'notice',value:noticeText});
    if(e2) throw e2;
    _dbOk = true; updateDbStatus();
  } catch(e){
    _dbOk = false; updateDbStatus();
    console.error('Supabase 저장 실패:', e);
    localStorage.setItem('cs_cards', JSON.stringify(cards));
    localStorage.setItem('cs_notice', noticeText);
    alert('DB 저장 실패: ' + (e.message||JSON.stringify(e)));
  }
}
async function load(){
  if(!csDB){
    try{
      const c=localStorage.getItem('cs_cards');
      const n=localStorage.getItem('cs_notice');
      if(c) cards=JSON.parse(c); else cards=JSON.parse(JSON.stringify(DEFAULT_CARDS));
      noticeText=(n!==null)?n:'';
      categories=[...new Set(cards.map(c=>c.category))];
    }catch(e){ cards=JSON.parse(JSON.stringify(DEFAULT_CARDS)); }
    return;
  }
  try{
    const {data:cd,error:ce}=await csDB.from('service_cards').select('*').order('sort_order',{ascending:true});
    if(ce) throw ce;
    if(cd&&cd.length>0){
      cards=cd.map(r=>({id:r.id,icon:r.icon,title:r.title,desc:r.description,
        category:r.category,color:r.color_index,link:r.link_url,
        isNew:r.is_new,requiresLogin:r.requires_login||false}));
    } else {
      cards=JSON.parse(JSON.stringify(DEFAULT_CARDS));
    }
    categories=[...new Set(cards.map(c=>c.category))];
    const {data:nd}=await csDB.from('settings').select('value').eq('key','notice').maybeSingle();
    noticeText=nd?.value||'';
    const {data:pid}=await csDB.from('settings').select('value').eq('key','portal_id').maybeSingle();
    const {data:ppw}=await csDB.from('settings').select('value').eq('key','portal_pw').maybeSingle();
    portalId=pid?.value||'';
    portalPw=ppw?.value||'';
    _dbOk=true;
  }catch(e){
    _dbOk=false;
    console.error('Supabase 로드 실패:', e);
    const c=localStorage.getItem('cs_cards');
    if(c) cards=JSON.parse(c); else cards=JSON.parse(JSON.stringify(DEFAULT_CARDS));
    categories=[...new Set(cards.map(c=>c.category))];
  }
}

// ── RENDER ────────────────────────────────────────────────────
function getCategories(){
  // merge: defined categories + any on cards not yet in list
  const extra = cards.map(c=>c.category).filter(c=>!categories.includes(c));
  return [...categories, ...extra];
}

function renderFilters(){
  const cats = getCategories();
  const wrap = document.getElementById('filter-btns');
  wrap.innerHTML = `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">전체</button>`
    + cats.map(c=>`<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}

function setFilter(f){
  activeFilter = f;
  renderFilters();
  renderCards();
}

function renderCards(){
  const q = (document.getElementById('search-input')?.value||'').trim().toLowerCase();
  const grid = document.getElementById('card-grid');
  let filtered = cards.filter(c=>{
    const matchCat = activeFilter==='all' || c.category===activeFilter;
    const matchQ = !q || c.title.toLowerCase().includes(q) || (c.desc||'').toLowerCase().includes(q) || c.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if(filtered.length===0){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없습니다</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(c=>{
    const col = COLORS[c.color||0];
    const locked = c.requiresLogin && c.link && c.link !== '#';
    return `<div class="card" onclick="handleCardClick('${c.id}')" title="${escH(c.title)}">
      ${locked?'<div class="card-lock">🔒</div>':''}
      ${c.isNew?'<div class="card-new">NEW</div>':''}
      <div class="card-badge" style="background:${col.bg};color:${col.text}">${c.category}</div>
      <div class="card-icon">${c.icon}</div>
      <div class="card-title">${escH(c.title)}</div>
      <div class="card-desc">${escH(c.desc||'')}</div>
      <div class="card-footer">
        <span class="card-link-label">${locked?'🔒 로그인 후 이동':'바로가기'} <span class="card-arrow">→</span></span>
      </div>
    </div>`;
  }).join('');
}


function handleCardClick(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  if(!c.link || c.link==='#'){ showLinkHint(id); return; }
  if(c.requiresLogin){
    if(!portalId||!portalPw){
      toast('포털 계정이 아직 설정되지 않았습니다. 관리자에게 문의하세요.','warn');
      return;
    }
    openCardLogin(id); return;
  }
  window.open(c.link,'_blank','noopener');
}

function openCardLogin(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  showModal('🔒 로그인이 필요합니다',
    `<div style="text-align:center;margin-bottom:18px">
       <div style="font-size:36px;margin-bottom:6px">🔒</div>
       <div style="font-size:13.5px;color:#475569">"<strong>${escH(c.title)}</strong>" 접근을 위해<br>로그인이 필요합니다.</div>
     </div>
     <div class="form-row">
       <label>아이디</label>
       <input id="portal-id-input" placeholder="아이디 입력" autocomplete="off">
     </div>
     <div class="form-row">
       <label>비밀번호</label>
       <input type="password" id="portal-pw-input" placeholder="비밀번호 입력"
              onkeydown="if(event.key==='Enter')verifyCardLogin('${c.id}')">
     </div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>
     <button class="btn btn-p" onclick="verifyCardLogin('${c.id}')">확인</button>`
  );
  setTimeout(()=>document.getElementById('portal-id-input')?.focus(),120);
}

function verifyCardLogin(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  const inputId = (document.getElementById('portal-id-input')?.value||'').trim();
  const inputPw = (document.getElementById('portal-pw-input')?.value||'').trim();
  if(inputId===portalId && inputPw===portalPw){
    closeModal();
    window.open(c.link,'_blank','noopener');
  } else {
    toast('아이디 또는 비밀번호가 일치하지 않습니다.','err');
    document.getElementById('portal-pw-input')?.select();
  }
}

function showLinkHint(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  if(adminMode){
    openCardForm(id);
    return;
  }
  showModal(`${c.icon} ${c.title}`,
    `<div style="color:#64748B;font-size:13px;line-height:1.7;margin-bottom:16px">${escH(c.desc||'설명이 없습니다.')}</div>
     <div style="background:#F8FAFC;border-radius:8px;padding:12px;font-size:12.5px;color:#94A3B8">
       <span style="color:#DC2626">⚠️</span> 연결된 링크가 없습니다.<br>관리자에게 링크 등록을 요청하세요.
     </div>`,
    `<button class="btn btn-p" onclick="closeModal()">확인</button>`);
}

function renderNotice(){
  const el = document.getElementById('notice-text');
  if(noticeText && noticeText.trim()){
    el.textContent = noticeText;
  } else {
    el.textContent = '공지사항이 없습니다. 관리자 페이지에서 공지를 등록할 수 있습니다.';
  }
}

// ── ADMIN ─────────────────────────────────────────────────────
function openAdminLogin(){
  if(adminMode){ exitAdmin(); return; }
  showModal('🔒 관리자 로그인',
    `<div class="form-row">
       <label>아이디</label>
       <input type="text" id="id-input" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pw-input')?.focus()">
     </div>
     <div class="form-row">
       <label>비밀번호</label>
       <input type="password" id="pw-input" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPw()">
     </div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>
     <button class="btn btn-p" onclick="checkPw()">로그인</button>`);
  setTimeout(()=>document.getElementById('id-input')?.focus(),100);
}

function checkPw(){
  const id = (document.getElementById('id-input')?.value||'').trim();
  const pw = document.getElementById('pw-input')?.value||'';
  if(id === ADMIN_ID && pw === ADMIN_PW){
    closeModal();
    enterAdmin();
  } else if(id !== ADMIN_ID){
    toast('아이디가 올바르지 않습니다','err');
    document.getElementById('id-input')?.select();
  } else {
    toast('비밀번호가 틀렸습니다','err');
    document.getElementById('pw-input')?.select();
  }
}

function enterAdmin(){
  adminMode = true;
  document.getElementById('admin-panel').classList.remove('hidden');
  document.querySelector('.hdr-admin-btn').textContent = '✅ 관리자 모드';
  renderAdminList();
  toast('관리자 모드 진입');
}

function exitAdmin(){
  adminMode = false;
  document.getElementById('admin-panel').classList.add('hidden');
  document.querySelector('.hdr-admin-btn').innerHTML = '🔒 관리자';
  toast('관리자 모드 종료');
}

function renderAdminList(){
  const list = document.getElementById('admin-list');
  if(cards.length===0){
    list.innerHTML = '<div style="text-align:center;padding:24px;color:#94A3B8;font-size:13px">카드가 없습니다. 카드를 추가해주세요.</div>';
    return;
  }
  list.innerHTML = cards.map((c,i)=>{
    const col = COLORS[c.color||0];
    return `<div class="admin-item" id="ai-${c.id}" draggable="true" ondragstart="dragStart(event,'${c.id}')" ondragover="dragOver(event,'${c.id}')" ondrop="dragDrop(event,'${c.id}')">
      <span class="drag-handle" title="드래그로 순서 변경">⠿</span>
      <div class="admin-item-icon">${c.icon}</div>
      <div class="admin-item-info">
        <div class="admin-item-title">${escH(c.title)} ${c.isNew?'<span style="background:#EF4444;color:#fff;font-size:9px;padding:1px 5px;border-radius:6px;vertical-align:middle">NEW</span>':''}</div>
        <div class="admin-item-meta"><span style="background:${col.bg};color:${col.text};padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">${c.category}</span>  ${c.link&&c.link!=='#'?'🔗 링크 있음':'⚠️ 링크 없음'}${c.requiresLogin?' 🔒 로그인 필요':''}</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn btn-g btn-sm" onclick="openCardForm('${c.id}')">✏️ 수정</button>
        <button class="btn btn-r btn-sm" onclick="deleteCard('${c.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── CARD FORM ─────────────────────────────────────────────────
let _selIcon = '📄';
let _selColor = 0;

function openCardForm(id){
  editingId = id || null;
  const c = id ? cards.find(x=>x.id===id) : null;
  _selIcon = c?.icon || '📄';
  _selColor = c?.color ?? 0;

  const iconGridHtml = ICONS.map(ic=>`<div class="icon-opt ${ic===_selIcon?'selected':''}" onclick="selectIcon('${ic}')">${ic}</div>`).join('');
  const colorGridHtml = COLORS.map((col,i)=>`<div class="color-opt ${i===_selColor?'selected':''}" style="background:${col.bg};border:3px solid ${i===_selColor?'#1F3864':col.bg}" onclick="selectColor(${i})" title="${col.label}"></div>`).join('');

  showModal(id?'✏️ 카드 수정':'➕ 카드 추가',
    `<div class="form-row">
       <label>아이콘</label>
       <div class="icon-grid" id="icon-grid">${iconGridHtml}</div>
       <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
         <span id="sel-icon-preview" style="font-size:28px">${_selIcon}</span>
         <span style="font-size:12px;color:#94A3B8">선택된 아이콘</span>
       </div>
     </div>
     <div class="form-row">
       <label>서비스명 <span style="color:#EF4444">*</span></label>
       <input id="f-title" value="${escA(c?.title||'')}" placeholder="예: 재직증명서 발급">
     </div>
     <div class="form-row">
       <label>설명</label>
       <textarea id="f-desc" placeholder="서비스에 대한 간단한 설명">${escA(c?.desc||'')}</textarea>
     </div>
     <div class="form-row-2">
       <div class="form-row" style="margin:0">
         <label>카테고리 <span style="color:#EF4444">*</span></label>
         <input id="f-cat" value="${escA(c?.category||'')}" placeholder="예: 증명서, 휴가" list="cat-list">
         <datalist id="cat-list">${getCategories().map(x=>`<option value="${escA(x)}">`).join('')}</datalist>
       </div>
       <div class="form-row" style="margin:0">
         <label>배지 색상</label>
         <div class="color-grid" id="color-grid">${colorGridHtml}</div>
       </div>
     </div>
     <div class="form-row">
       <label>링크 URL</label>
       <input id="f-link" value="${escA(c?.link&&c.link!=='#'?c.link:'')}" placeholder="https://...">
     </div>
     <div class="form-row">
       <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal">
         <input type="checkbox" id="f-new" ${c?.isNew?'checked':''}> NEW 배지 표시
       </label>
     </div>
     <div class="form-row">
       <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal">
         <input type="checkbox" id="f-require-login" ${c?.requiresLogin?'checked':''}> 🔒 링크 접근 시 로그인 필요
       </label>
     </div>\``,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>
     ${id?`<button class="btn btn-r" onclick="deleteCard('${id}');closeModal()">삭제</button>`:''}
     <button class="btn btn-p" onclick="saveCard()">${id?'저장':'추가'}</button>`
  );
}

function selectIcon(ic){
  _selIcon = ic;
  document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('selected', el.textContent===ic));
  document.getElementById('sel-icon-preview').textContent = ic;
}

function selectColor(i){
  _selColor = i;
  document.querySelectorAll('.color-opt').forEach((el,idx)=>{
    const col = COLORS[idx];
    el.style.border = `3px solid ${idx===i?'#1F3864':col.bg}`;
    el.classList.toggle('selected',idx===i);
  });
}

function saveCard(){
  const title = (document.getElementById('f-title')?.value||'').trim();
  const desc  = (document.getElementById('f-desc')?.value||'').trim();
  const cat   = (document.getElementById('f-cat')?.value||'').trim();
  const link  = (document.getElementById('f-link')?.value||'').trim();
  const isNew = document.getElementById('f-new')?.checked||false;
  const requiresLogin = document.getElementById('f-require-login')?.checked||false;
  if(!title){toast('서비스명을 입력하세요','warn');return;}
  if(!cat){toast('카테고리를 입력하세요','warn');return;}

  if(editingId){
    const c = cards.find(x=>x.id===editingId);
    if(c){ c.icon=_selIcon; c.title=title; c.desc=desc; c.category=cat; c.link=link||'#'; c.isNew=isNew; c.color=_selColor; c.requiresLogin=requiresLogin; }
    toast('✅ 카드 수정 완료');
  } else {
    cards.push({id:'c'+Date.now(),icon:_selIcon,title,desc,category:cat,link:link||'#',isNew,color:_selColor,requiresLogin});
    toast('✅ 카드 추가 완료');
  }
  save();
  closeModal();
  renderAll();
}

// ── CATEGORY MANAGER ─────────────────────────────────────────

function openPortalSettings(){
  showModal('🔑 포털 접근 계정 설정',
    `<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#92400E">
       🔒 카드에 "로그인 필요" 설정 시, 이 계정으로 인증합니다.
     </div>
     <div class="form-row">
       <label>포털 아이디</label>
       <input id="ps-id" value="${escA(portalId)}" placeholder="예: staff">
     </div>
     <div class="form-row">
       <label>포털 비밀번호</label>
       <input type="password" id="ps-pw" value="${escA(portalPw)}" placeholder="비밀번호 입력">
     </div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>
     <button class="btn btn-p" onclick="savePortalSettings()">저장</button>`
  );
}

async function savePortalSettings(){
  const id = (document.getElementById('ps-id')?.value||'').trim();
  const pw = (document.getElementById('ps-pw')?.value||'').trim();
  if(!id||!pw){ toast('아이디와 비밀번호를 입력하세요','warn'); return; }
  portalId = id; portalPw = pw;
  if(csDB){
    await csDB.from('settings').upsert({key:'portal_id', value:id});
    await csDB.from('settings').upsert({key:'portal_pw', value:pw});
  }
  closeModal();
  toast('✅ 포털 계정 저장 완료 (ID: '+id+')');
}

function openCategoryManager(){
  _renderCategoryModal();
}

function _renderCategoryModal(){
  const cats = getCategories();
  const listHtml = cats.length === 0
    ? '<div style="text-align:center;padding:16px;color:#94A3B8;font-size:12.5px">카테고리가 없습니다</div>'
    : cats.map(cat => {
        const count = cards.filter(c=>c.category===cat).length;
        return `<div style="display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid #E2E8F0;border-radius:8px;background:#F8FAFC;margin-bottom:6px">
          <div style="flex:1;font-size:13.5px;font-weight:700;color:#1E293B">${escH(cat)}</div>
          <div style="font-size:11px;color:#94A3B8;flex-shrink:0">${count}개 카드</div>
          <button class="btn btn-g btn-sm" onclick="openRenameCategory('${escA(cat)}')">✏️ 이름 변경</button>
          <button class="btn btn-r btn-sm" onclick="deleteCategoryPrompt('${escA(cat)}')">🗑</button>
        </div>`;
      }).join('');

  showModal('🏷️ 카테고리 관리',
    listHtml +
    `<div style="background:#F0F9FF;border:1px solid #BAE6FD;border-radius:8px;padding:12px;margin-top:10px">
       <div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:8px">➕ 새 카테고리 추가</div>
       <div style="display:flex;gap:8px">
         <input id="new-cat-input" placeholder="카테고리 이름" style="flex:1;padding:8px 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')addCategory()">
         <button class="btn btn-p" onclick="addCategory()">추가</button>
       </div>
     </div>`,
    `<div></div><button class="btn btn-p" onclick="closeModal()">닫기</button>`
  );
}

function addCategory(){
  const name = (document.getElementById('new-cat-input')?.value||'').trim();
  if(!name){ toast('카테고리 이름을 입력하세요','warn'); return; }
  if(getCategories().includes(name)){ toast('이미 있는 카테고리입니다','warn'); return; }
  categories.push(name);
  save();
  renderFilters();
  toast(`✅ "${name}" 카테고리 추가`);
  _renderCategoryModal();
}

function openRenameCategory(oldName){
  showModal(`✏️ 카테고리 이름 변경`,
    `<div class="form-row">
       <label>현재 이름</label>
       <input value="${escA(oldName)}" disabled style="background:#F8FAFC;color:#94A3B8">
     </div>
     <div class="form-row">
       <label>새 이름 <span style="color:#EF4444">*</span></label>
       <input id="rename-cat-input" value="${escA(oldName)}" onkeydown="if(event.key==='Enter')renameCategory('${escA(oldName)}')">
       <div style="font-size:11px;color:#64748B;margin-top:4px">이 카테고리를 사용하는 모든 카드에 자동 반영됩니다</div>
     </div>`,
    `<button class="btn btn-g" onclick="openCategoryManager()">취소</button>
     <button class="btn btn-p" onclick="renameCategory('${escA(oldName)}')">저장</button>`
  );
  setTimeout(()=>{ const el=document.getElementById('rename-cat-input'); if(el){el.focus();el.select();} },100);
}

function renameCategory(oldName){
  const newName = (document.getElementById('rename-cat-input')?.value||'').trim();
  if(!newName){ toast('이름을 입력하세요','warn'); return; }
  if(newName === oldName){ openCategoryManager(); return; }
  if(getCategories().filter(c=>c!==oldName).includes(newName)){ toast('이미 있는 카테고리입니다','warn'); return; }
  // update categories array
  const idx = categories.indexOf(oldName);
  if(idx>=0) categories[idx] = newName; else categories.push(newName);
  // update all cards
  cards.forEach(c=>{ if(c.category===oldName) c.category=newName; });
  if(activeFilter===oldName) activeFilter=newName;
  save();
  renderAll();
  toast(`✅ "${oldName}" → "${newName}" 변경 완료`);
  openCategoryManager();
}

function deleteCategoryPrompt(cat){
  const count = cards.filter(c=>c.category===cat).length;
  const otherCats = getCategories().filter(c=>c!==cat);
  const reassignOpts = otherCats.length > 0
    ? `<div class="form-row" style="margin-top:10px">
         <label>이 카테고리의 카드(${count}개)를 다른 카테고리로 이동:</label>
         <select id="reassign-cat">
           <option value="__delete__" style="color:#DC2626">카드도 함께 삭제</option>
           ${otherCats.map(c=>`<option value="${escA(c)}">${escH(c)}</option>`).join('')}
         </select>
       </div>`
    : `<div style="background:#FEE2E2;border-radius:8px;padding:10px;font-size:12.5px;color:#DC2626;margin-top:10px">
         ⚠️ 다른 카테고리가 없습니다. 이 카테고리의 카드 ${count}개도 함께 삭제됩니다.
       </div>`;
  showModal(`🗑 카테고리 삭제`,
    `<div style="font-size:13px;color:#1E293B;margin-bottom:4px"><strong>"${escH(cat)}"</strong> 카테고리를 삭제합니다.</div>
     <div style="font-size:12px;color:#64748B">이 카테고리를 사용 중인 카드가 ${count}개 있습니다.</div>
     ${reassignOpts}`,
    `<button class="btn btn-g" onclick="openCategoryManager()">취소</button>
     <button class="btn btn-r" onclick="deleteCategory('${escA(cat)}')">삭제</button>`
  );
}

function deleteCategory(cat){
  const sel = document.getElementById('reassign-cat')?.value;
  if(sel === '__delete__' || !sel){
    cards = cards.filter(c=>c.category!==cat);
  } else {
    cards.forEach(c=>{ if(c.category===cat) c.category=sel; });
  }
  categories = categories.filter(c=>c!==cat);
  if(activeFilter===cat) activeFilter='all';
  save();
  renderAll();
  toast(`"${cat}" 카테고리 삭제됨`);
  openCategoryManager();
}

function deleteCard(id){
  if(!confirm('이 카드를 삭제할까요?'))return;
  cards = cards.filter(c=>c.id!==id);
  save();
  renderAll();
  toast('삭제됨');
}

// ── NOTICE EDIT ───────────────────────────────────────────────
function openNoticeEdit(){
  showModal('📢 공지 수정',
    `<div class="form-row">
       <label>공지 내용 (비워두면 공지 숨김)</label>
       <textarea id="f-notice" rows="3" placeholder="예: 2025년 하반기 정기 건강검진 신청이 시작되었습니다.">${escA(noticeText)}</textarea>
     </div>`,
    `<button class="btn btn-g" onclick="closeModal()">취소</button>
     <button class="btn btn-p" onclick="saveNotice()">저장</button>`);
}

function saveNotice(){
  noticeText = (document.getElementById('f-notice')?.value||'').trim();
  save();
  renderNotice();
  closeModal();
  toast('✅ 공지 업데이트');
}

// ── DRAG REORDER ──────────────────────────────────────────────
let _dragId = null;
function dragStart(e, id){ _dragId=id; e.dataTransfer.effectAllowed='move'; }
function dragOver(e, id){ e.preventDefault(); }
function dragDrop(e, id){
  e.preventDefault();
  if(!_dragId || _dragId===id) return;
  const from = cards.findIndex(c=>c.id===_dragId);
  const to   = cards.findIndex(c=>c.id===id);
  if(from<0||to<0) return;
  const [item] = cards.splice(from,1);
  cards.splice(to,0,item);
  save();
  renderAdminList();
  renderCards();
  _dragId=null;
}

// ── MODAL ─────────────────────────────────────────────────────
function showModal(title, body, foot){
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-foot').innerHTML = foot||'';
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay'))closeModal(); });

// ── TOAST ─────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='err'?'#DC2626':type==='warn'?'#D97706':'#1E293B';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── UTILS ─────────────────────────────────────────────────────
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderAll(){
  renderFilters();
  renderCards();
  if(adminMode) renderAdminList();
}

// ── INIT ──────────────────────────────────────────────────────
(async()=>{ await load(); renderNotice(); renderAll(); updateDbStatus(); })();
</script>
</body>
</html>
